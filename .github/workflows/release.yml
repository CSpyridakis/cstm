name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y rpm ruby-dev
          sudo gem install fpm --no-doc

      - name: Build .deb and .rpm
        env:
          VERSION: ${{ steps.tag.outputs.new_version }}
        run: |
          mkdir -p staging/usr/bin staging/usr/share/bash-completion/completions

          install -m 755 cstm staging/usr/bin/cstm

          BASE_ARGS=(
            -n cstm
            -v "$VERSION"
            --description "Terminal countdown and stopwatch with big ASCII text"
            --url "${{ github.server_url }}/${{ github.repository }}"
            --maintainer "Christos Spyridakis <me@cspyridakis.com>"
          )
          # Create deb
          fpm -s dir -t deb "${BASE_ARGS[@]}" \
            -d figlet \
            -C staging .

          # Create rpm
          fpm -s dir -t rpm "${BASE_ARGS[@]}" \
            -d epel-release \
            -d figlet \
            -C staging .

      - name: Build Homebrew formula
        env:
          TAG: ${{ steps.tag.outputs.new_tag }}
          VERSION: ${{ steps.tag.outputs.new_version }}
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
        run: |
          TARBALL_URL="${SERVER}/${REPO}/archive/refs/tags/${TAG}.tar.gz"
          curl -sL "$TARBALL_URL" -o source.tar.gz
          SHA256=$(sha256sum source.tar.gz | awk '{print $1}')

          cat > cstm.rb <<EOF
          class Cstm < Formula
            desc "Terminal countdown and stopwatch with big ASCII text"
            homepage "${SERVER}/${REPO}"
            url "${TARBALL_URL}"
            sha256 "${SHA256}"
            license "MIT"
            version "${VERSION}"

            depends_on "figlet"

            def install
              bin.install "cstm"
            end

            test do
              assert_predicate bin/"cstm", :exist?
            end
          end
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          files: |
            *.deb
            *.rpm
            cstm.rb
